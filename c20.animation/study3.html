<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가로 무한 마키 애니메이션</title>
    <link rel="stylesheet" href="./study3.css">
</head>
<body>
    <main class="marquee" aria-label="웹 디자인 수업 키워드">
        <div class="marquee-track">
            <div class="marquee-group">
                <span>HTML</span>
                <span>CSS</span>
                <span>ANIMATION</span>
                <span>WEB DESIGN</span>
                <span>CREATIVE</span>
            </div>

            <!-- 자연스럽게 이어지도록 같은 내용을 한 번 더 배치 -->
            <div class="marquee-group" aria-hidden="true">
                <span>HTML</span>
                <span>CSS</span>
                <span>ANIMATION</span>
                <span>WEB DESIGN</span>
                <span>CREATIVE</span>
            </div>
        </div>
    </main>
</body>
</html>
