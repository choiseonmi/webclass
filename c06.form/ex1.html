<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양식태그 예시1</title>
</head>
<body>
    <h1>CREATE YOUR ACCOUNT</h1>
    <form action="#">
    <div>
        <label for="userEmail">Email Address</label>
        <input type="text" id="userEmail">
    </div>
    <div>
        <label for="userAddress">Confirm your address</label>
        <input type="text" id="userAddress">
    </div>
     <div>
        <label for="Residence">Country of Residence</label>
            <select name="Residence" id="Residence">
                <option value="aland islands">Aland islands</option>
                <option value="bahamas">Bahamas</option>
                <option value="china">China</option>
                <option value="denmark">Denmark</option>
                <option value="egypt">Egypt</option>
                <option value="france">France</option>
                <option value="united kingdom">United Kingdom</option>
                <option value="korea, republic of" selected>Korea, Republic of</option>
            </select>
    </div>
    <div>
        <input type="checkbox" id="userAgree" name="userAgree">
                <label for="userAgree">I am 13 years of age or older and agree to the terms of the <i>Steam Subscriber Agreement</i> and the <i>Valve Privacy Policy</i>.</label>
            </div>            
        <button type="submit">Continue</button> 
    </form>      
</body>
</html>
